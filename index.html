<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Journey - Peak Highlight</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bar-standard: linear-gradient(180deg, #f9a8d4 0%, #f472b6 100%);
        --bar-peak: linear-gradient(
          180deg,
          #fbbf24 0%,
          #f59e0b 100%
        ); /* Gold/Orange */
        --bg-soft: #fff1f2;
        --text-main: #4b5563;
        --accent-rose: #be185d;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg-soft);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: white;
        width: 100%;
        max-width: 850px;
        padding: 2.5rem;
        border-radius: 2.5rem;
        box-shadow: 0 20px 50px rgba(244, 114, 182, 0.15);
      }

      /* Top Stats */
      .stats-row {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        margin-bottom: 3rem;
      }

      .stat-box {
        flex: 1;
        background: #fffafa;
        padding: 1rem;
        border-radius: 1.2rem;
        text-align: center;
        border: 1px solid #ffe4e6;
      }

      .stat-box.highlight {
        background: #fef3c7;
        border-color: #fcd34d;
      }

      .stat-val {
        display: block;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--accent-rose);
      }
      .stat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #9ca3af;
        letter-spacing: 0.5px;
      }

      /* Chart */
      .chart-area {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        height: 250px;
        border-bottom: 2px solid #fff1f2;
        padding-bottom: 10px;
      }

      .bar-group {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        position: relative;
      }

      .bar {
        width: 70%;
        max-width: 35px;
        background: var(--bar-standard);
        border-radius: 15px 15px 4px 4px;
        cursor: pointer;
        transition: 0.3s ease;
      }

      /* --- THE PEAK HIGHLIGHT --- */
      .bar.is-peak {
        background: var(--bar-peak);
        box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        transform: scale(1.05);
        border: 2px solid #fff;
      }

      .peak-label {
        position: absolute;
        top: -30px;
        background: #f59e0b;
        color: white;
        font-size: 9px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: uppercase;
      }

      .date-text {
        margin-top: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
      }

      .tooltip {
        position: absolute;
        bottom: 105%;
        background: #334155;
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 10px;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
        white-space: nowrap;
      }

      .bar-group:hover .tooltip {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="text-align: left; margin-bottom: 2rem">
        <h2 style="color: var(--accent-rose); margin: 0; font-weight: 600">
          Study Performance
        </h2>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-top: 4px">
          Tracking the last 10 days of progress
        </p>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">Total Hours</span>
          <span class="stat-val">110.5h</span>
        </div>
        <div class="stat-box highlight">
          <span class="stat-label">Best Session</span>
          <span class="stat-val">16h 15m</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Daily Average</span>
          <span class="stat-val">11h 03m</span>
        </div>
      </div>

      <div class="chart-area">
        <div class="bar-group">
          <span class="peak-label">Best Day</span>
          <div class="bar is-peak" style="height: 81%"></div>
          <div class="tooltip">16h 15m</div>
          <div class="date-text">15 Sun</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 75%"></div>
          <div class="tooltip">15h 06m</div>
          <div class="date-text">16 Mon</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 72%"></div>
          <div class="tooltip">14h 33m</div>
          <div class="date-text">17 Tue</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 27%"></div>
          <div class="tooltip">5h 34m</div>
          <div class="date-text">18 Wed</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 15%"></div>
          <div class="tooltip">3h 09m</div>
          <div class="date-text">19 Thu</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 2%; background: #e2e8f0"></div>
          <div class="tooltip">0h 00m</div>
          <div class="date-text">20 Fri</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 62%"></div>
          <div class="tooltip">12h 27m</div>
          <div class="date-text">21 Sat</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 69%"></div>
          <div class="tooltip">13h 52m</div>
          <div class="date-text">22 Sun</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 80%"></div>
          <div class="tooltip">16h 05m</div>
          <div class="date-text">23 Mon</div>
        </div>

        <div class="bar-group">
          <div class="bar" style="height: 67%"></div>
          <div class="tooltip">13h 29m</div>
          <div class="date-text">24 Tue</div>
        </div>
      </div>
    </div>
  </body>
</html>
